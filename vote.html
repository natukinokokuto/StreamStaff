<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StreamStaff 投票</title>
<style>
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#211342,#05060a 58%);
  color:#fff;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.card{
  width:min(520px,100%);
  background:#0b0d13;
  border:1px solid #2e3350;
  border-radius:24px;
  padding:20px;
  box-shadow:0 22px 70px #0009;
}
h1{margin:0 0 8px;font-size:28px}
.muted{color:#aab2c8}
.option{
  width:100%;
  border:1px solid #343b58;
  background:#111827;
  color:white;
  border-radius:16px;
  padding:14px;
  margin-top:10px;
  font-weight:900;
  font-size:18px;
}
.option:active{transform:scale(.98)}
.done{
  display:none;
  margin-top:14px;
  background:#102a1f;
  border:1px solid #22c55e;
  border-radius:16px;
  padding:14px;
  color:#bbf7d0;
}
.warn{
  margin-top:14px;
  background:#2a1907;
  border:1px solid #f59e0b;
  border-radius:16px;
  padding:12px;
  color:#fed7aa;
  font-size:14px;
}
</style>
</head>
<body>
  <div class="card">
    <div class="muted">StreamStaff 投票ページ</div>
    <h1 id="title">投票</h1>
    <div class="muted">選択肢を押して投票</div>
    <div id="options"></div>
    <div id="done" class="done">投票ありがとう！</div>
    <div class="warn">
      現在このページはQR/URL表示用の受け皿です。Firebase連携が有効になると、ここから主のStreamStaffへリアルタイム反映できます。
    </div>
  </div>
<script>
const params=new URLSearchParams(location.search);
const title=params.get("title")||"投票";
const options=(params.get("options")||"").split("|").filter(Boolean);
document.getElementById("title").textContent=title;
const box=document.getElementById("options");
box.innerHTML=options.map((o,i)=>`<button class="option" data-i="${i}">${escapeHtml(o)}</button>`).join("") || "<p>選択肢がありません</p>";
box.querySelectorAll(".option").forEach(btn=>{
  btn.onclick=()=>{
    document.getElementById("done").style.display="block";
    // Firebase連携版ではここで送信する
  };
});
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\\"":"&quot;","'":"&#39;"}[m]))}
</script>
</body>
</html>
