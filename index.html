<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>チンチロ演出デモ</title>
<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}
.wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  gap:20px;
}
.dice-area{
  display:flex;
  gap:20px;
}
.dice{
  width:90px;
  height:90px;
  background:#fff;
  color:#111;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  font-weight:bold;
  box-shadow:0 0 25px rgba(255,255,255,.2);
}
.roll{
  animation:spin .12s linear infinite;
}
@keyframes spin{
  0%{transform:rotate(0deg) scale(1);}
  50%{transform:rotate(180deg) scale(1.1);}
  100%{transform:rotate(360deg) scale(1);}
}
button{
  background:#b91c1c;
  border:none;
  color:white;
  padding:18px 40px;
  font-size:24px;
  border-radius:16px;
  cursor:pointer;
}
.result{
  position:absolute;
  top:20%;
  right:-100%;
  font-size:70px;
  font-weight:bold;
  opacity:0;
  text-shadow:0 0 20px rgba(255,255,255,.7);
}
.show{
  animation:slash 1s forwards;
}
@keyframes slash{
  0%{
    right:-100%;
    opacity:0;
    transform:skewX(-25deg);
  }
  40%{
    opacity:1;
  }
  100%{
    right:10%;
    opacity:1;
    transform:skewX(0deg);
  }
}
.rules{
  position:absolute;
  right:20px;
  bottom:20px;
  background:#111;
  border:1px solid #444;
  padding:15px;
  border-radius:14px;
  width:220px;
}
.rules h3{
  margin-top:0;
}
.gold{
  color:gold;
}
.blue{
  color:#7dd3fc;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="dice-area">
    <div class="dice" id="d1">1</div>
    <div class="dice" id="d2">1</div>
    <div class="dice" id="d3">1</div>
  </div>

  <button onclick="rollDice()">回す</button>

  <div class="result" id="result">── ピンゾロ ──</div>

  <div class="rules">
    <h3>チンチロ役表</h3>
    <div>ピンゾロ → 最強</div>
    <div>シゴロ → 強</div>
    <div>通常目 → 普通</div>
    <div>ヒフミ → 最弱</div>
  </div>
</div>

<audio id="glass" src="氷の入ったグラス.mp3"></audio>
<audio id="drum" src="小鼓（こつづみ）.mp3"></audio>
<audio id="horn" src="ほら貝を吹き鳴らす.mp3"></audio>
<audio id="fail" src="チーン1.mp3"></audio>

<script>
const diceEls = [
 document.getElementById("d1"),
 document.getElementById("d2"),
 document.getElementById("d3")
];

function setResult(text, cls=""){
  const el=document.getElementById("result");
  el.className="result "+cls+" show";
  el.innerText=text;
}

function rollDice(){
  document.getElementById("glass").play();

  document.getElementById("result").className="result";

  diceEls.forEach(d=>d.classList.add("roll"));

  let interval=setInterval(()=>{
    diceEls.forEach(d=>{
      d.innerText=Math.floor(Math.random()*6)+1;
    });
  },100);

  setTimeout(()=>{
    clearInterval(interval);

    let final=[rand(),rand(),rand()];

    if(Math.random()<0.15){
      final=[1,1,1];
    }

    if(Math.random()<0.1){
      final=[1,2,3];
    }

    diceEls.forEach((d,i)=>{
      d.classList.remove("roll");
      d.innerText=final[i];
    });

    document.getElementById("drum").play();

    const sorted=[...final].sort().join("");

    setTimeout(()=>{
      if(sorted==="111"){
        document.body.style.background="#3b0000";
        document.getElementById("horn").play();
        setResult("── ピンゾロ ──","gold");
      }else if(sorted==="123"){
        document.body.style.background="#001b2e";
        document.getElementById("fail").play();
        setResult("── ヒフミ ──","blue");
      }else{
        document.body.style.background="#0a0a0a";
        setResult("── 通常目 ──");
      }
    },350);

  },1400);
}

function rand(){
 return Math.floor(Math.random()*6)+1;
}
</script>
</body>
</html>
